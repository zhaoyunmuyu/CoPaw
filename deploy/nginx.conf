events {
    worker_connections 1024;
}

http {
    upstream copaw {
        least_conn;
        server copaw:8088;
    }

    server {
        listen 8088;

        location / {
            proxy_pass http://copaw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}