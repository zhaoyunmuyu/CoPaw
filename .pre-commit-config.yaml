repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-ast
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: sort-simple-yaml
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: check-yaml
        exclude: |
          (?x)^(
              meta.yaml
          )$
      - id: check-xml
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: check-toml
      - id: check-docstring-first
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: check-json
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: fix-encoding-pragma
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: detect-private-key
      - id: trailing-whitespace
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        exclude:
          (?x)(
          pb2\.py$
          | grpc\.py$
          | ^docs
          | \.html$
          | .*/skills/.*
          )
        args: [
          --ignore-missing-imports,
          --disable-error-code=var-annotated,
          --disable-error-code=union-attr,
          --disable-error-code=assignment,
          --disable-error-code=attr-defined,
          --disable-error-code=import-untyped,
          --disable-error-code=truthy-function,
          --follow-imports=skip,
          --explicit-package-bases,
        ]
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        args: [ --line-length=79 ]
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [ "--extend-ignore=E203", "--max-complexity=15"]
        additional_dependencies: ["flake8-bugbear>=23.0.0"]
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-iii", "-ll", "-c", "pyproject.toml"]
        exclude: '(?x)(.*/skills/.*|^scripts/pack/|^tests/)'
  - repo: https://github.com/pylint-dev/pylint
    rev: v3.0.2
    hooks:
      - id: pylint
        exclude:
          (?x)(
          ^docs
          | pb2\.py$
          | grpc\.py$
          | \.demo$
          | \.md$
          | \.html$
          | .*/skills/.*
          )
        args: [
          # Enabled key rules for code quality:
          # E0101: return-in-init, E0105: return-in-generator
          # E0104/E0106: yield outside function, E0711: notimplemented-raised
          # E0710: catching-non-exception, E0702: raising-bad-type
          # E0107: duplicate-argument-name, R1710: inconsistent-return-statements
          # E0213: no-self-argument, E0603: undefined-all-variable
          --max-line-length=79,
          --disable=W0511,
          --disable=W0718,
          --disable=C0103,
          --disable=R0913,
          --disable=E0401,
          --disable=E1101,
          --disable=C0415,
          --disable=W0603,
          --disable=R1705,
          --disable=R0914,
          --disable=E0601,
          --disable=W0602,
          --disable=W0604,
          --disable=R0801,
          --disable=R0902,
          --disable=R0903,
          --disable=C0123,
          --disable=W0231,
          --disable=W1113,
          --disable=W0221,
          --disable=R0401,
          --disable=W0632,
          --disable=W0123,
          --disable=C3001,
          --disable=W0201,
          --disable=C0302,
          --disable=W1203,
          --disable=C2801,
          --disable=C0114,
          --disable=C0115,
          --disable=C0116,
        ]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: 'v3.0.0'
    hooks:
      - id: prettier
        additional_dependencies: [ 'prettier@3.0.0' ]
        files: \.(tsx?)$
        exclude: '(?x)(^web/|^console/|/dist/|.*/skills/.*|^scripts/pack/)'